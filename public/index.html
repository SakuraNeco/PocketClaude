// ── PWA / Push ──
const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

let pushMode = null;   // remembered so a language switch can re-render the bar
function showPushBar(mode) {
  pushMode = mode;
  const bar = $('push-bar');
  bar.style.display = 'flex';
  if (mode === 'ios-install') {
    bar.innerHTML = `<i class="ti ti-square-arrow-up"></i> ${esc(T('ios_install'))}`;
    bar.onclick = null;
  } else {
    bar.innerHTML = `<i class="ti ti-bell"></i> ${esc(T('push_enable'))}`;
    bar.onclick = subscribePush;
  }
}
function hidePushBar() { pushMode = null; $('push-bar').style.display = 'none'; }

async function doSubscribe(reg) {
  const { key } = await (await fetch('/vapid-public-key')).json();
  let sub = await reg.pushManager.getSubscription();
  if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64(key) });
  // lang rides along so the server can push notifications in THIS device's language
  await fetch('/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...sub.toJSON(), lang: LANG }) });
  return sub;
}

// After a language switch, re-register the existing subscription with the new lang.
async function syncPushLang() {
  try {
    if (!('serviceWorker' in navigator)) return;
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) await fetch('/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...sub.toJSON(), lang: LANG }) });
  } catch {}
}

async function ensurePush() {
  // iOS exposes Push only when the site is installed to the Home Screen
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    if (isIOS && !isStandalone) showPushBar('ios-install');
    return;
  }
  const reg = await navigator.serviceWorker.register('/sw.js');
  reg.update().catch(() => {});   // proactively pick up new SW versions on every launch
  if (Notification.permission === 'granted') {
    try { await doSubscribe(reg); } catch {}   // re-sync after a server restart
    hidePushBar();
  } else {
    showPushBar('enable');
  }
}

async function subscribePush() {
  if (isIOS && !isStandalone) {
    alert(T('ios_alert'));
    return;
  }
  if (await Notification.requestPermission() !== 'granted') return;
  const reg = await navigator.serviceWorker.ready;
  await doSubscribe(reg);
  hidePushBar();
  try { await fetch('/test-push', { method: 'POST' }); } catch {}   // immediate confirmation
}

function urlB64(b) {
  const r = atob((b+'='.repeat((4-b.length%4)%4)).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...r].map(c => c.charCodeAt(0)));
}
// ── Auth: exchange the login key for the HttpOnly cc_auth cookie. The cookie
// then covers fetch / WS / media / proxy automatically; the key is kept in
// localStorage so re-auth after a cookie expiry is silent. ──
async function tryAuth(token) {
  try {
    const r = await fetch('/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
    return r.ok;
  } catch { return false; }
}
// In-page key entry — window.prompt() is silently suppressed in PWA/standalone
// modes, which left new devices staring at a blank dark screen.
function askKey(errMsg) {
  return new Promise(res => {
    const input = $('login-key');
    $('login-modal').classList.add('open');
    $('login-err').textContent = errMsg || '';
    input.value = '';
    setTimeout(() => input.focus(), 60);
    const submit = () => { const v = input.value.trim(); if (v) res(v); };
    $('login-go').onclick = submit;
    input.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); submit(); } };
  });
}
async function ensureAuth() {
  let token = '';
  try { token = localStorage.getItem('authToken') || ''; } catch {}
  if (await tryAuth(token)) return true;   // stored key or still-valid cookie
  let err = '';
  for (;;) {
    const t = await askKey(err);
    if (await tryAuth(t)) {
      try { localStorage.setItem('authToken', t); } catch {}
      $('login-modal').classList.remove('open');
      return true;
    }
    err = T('login_bad');
    $('login-err').textContent = err;
  }
}

// ── Language: rewrite static chrome + re-render the open conversation ──
function applyLang(l) {
  if (I18N[l]) LANG = l;
  try { localStorage.setItem('lang', LANG); } catch {}
  document.documentElement.lang = LANG;
  $('lang-sel').value = LANG;
  $('nav-conn').textContent = T(connKey);
  $('btn-stop').innerHTML = `<i class="ti ti-player-stop-filled"></i> ${T('stop')}`;
  $('send-to-label').textContent = T('send_to');
  $('prompt').placeholder = T('input_ph');
  $('cwd-input').placeholder = T('cwd_ph');
  $('sb-head').textContent = T('sessions');
  $('sheet-head').textContent = T('sessions');
  const se = $('sheet-empty'); if (se) se.textContent = T('detecting');
  const fl = $('files-label'); if (fl) fl.textContent = T('files');
  const setOpts = (id, map) => { for (const o of $(id).options) if (map[o.value]) o.textContent = T(map[o.value]); };
  setOpts('perm-mode', { interactive:'perm_interactive', acceptEdits:'perm_acceptEdits', bypassPermissions:'perm_bypass', plan:'perm_plan' });
  setOpts('model-sel', { default:'model_default' });
  setOpts('effort-sel', { default:'effort_default', low:'effort_low', medium:'effort_medium', high:'effort_high', xhigh:'effort_xhigh', max:'effort_max' });
  if (pushMode) showPushBar(pushMode);
  const rl = $('btn-reload'); if (rl) { rl.title = T('reload'); rl.setAttribute('aria-label', T('reload')); }
  const up = $('update-txt'); if (up && $('update-pill').classList.contains('on')) up.textContent = T('update_avail');
  // login overlay labels
  $('login-sub').textContent = T('login_prompt');
  $('login-go').textContent = T('login_go');
  // advanced-options modal labels
  $('adv-title-t').textContent = T('adv');
  const advMap = { 'l-fork':'adv_fork','d-fork':'adv_fork_d','l-wt':'adv_wt','d-wt':'adv_wt_d','l-ro':'adv_ro','d-ro':'adv_ro_d','l-cont':'adv_cont','d-cont':'adv_cont_d','l-name':'adv_name','l-dirs':'adv_dirs','l-sys':'adv_sys','l-fb':'adv_fb' };
  for (const [id, k] of Object.entries(advMap)) { const el = $(id); if (el) el.textContent = T(k); }
  $('adv-clear').textContent = T('adv_clear');
  if (aid && S[aid]?.loaded) renderAll(aid);   // tool cards / buttons pick up the new language
  syncPushLang();                              // push notifications follow the UI language
}
$('lang-sel').addEventListener('change', () => applyLang($('lang-sel').value));
applyLang(LANG);
if (!SpeechRec) $('btn-mic').style.display = 'none';   // hide mic where unsupported

// Focusing an already-open PWA window from a push tap → jump to that session.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    const sid = e.data?.type === 'open-session' && e.data.sessionId;
    if (sid && S[sid]) pick(sid);
  });
}

// One-time update check on open: ask the server how far the installed copy is
// behind the repo's main branch on GitHub. Uses GitHub's free public API (no
// Claude/API quota), server-cached 1h. Shows a nav pill only when behind.
async function checkForUpdate() {
  try {
    const v = await (await fetch('/version')).json();
    const pill = $('update-pill');
    if (v.status === 'behind' && v.behind > 0) {
      pill.href = v.url || '#';
      pill.title = `${v.behind} ${v.behind === 1 ? 'commit' : 'commits'} behind${v.version ? ' · v' + v.version : ''}`;
      $('update-txt').textContent = T('update_avail');
      pill.classList.add('on');
    }
  } catch {}
}

(async () => {
  captureUrlToken();   // fleet switch: ?token= → silent login, then scrub URL
  if (!(await ensureAuth())) return;
  ensurePush();
  connect();
  checkForUpdate();   // once, on open
})();
</script>
