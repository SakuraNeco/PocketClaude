<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>PocketClaude — Viewer</title>
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<link rel="stylesheet" href="/vendor/github-dark.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d0d;--bg2:#1c1c1e;--border:#2a2a2c;--text:#f0f0ee;--text2:#aeaeb2;--blue:#4f8ef7;--code:#e5c07b;}
:root[data-theme="light"]{--bg:#ffffff;--bg2:#f2f2f5;--border:#e7e7ec;--text:#1a1a1e;--text2:#55555e;--blue:#0a6cff;--code:#a16207;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;line-height:1.7;padding:24px 18px calc(48px + env(safe-area-inset-bottom));max-width:820px;margin:0 auto;-webkit-text-size-adjust:100%;}
#bar{position:sticky;top:0;display:flex;align-items:center;gap:10px;padding:10px 0;margin:-24px 0 12px;background:var(--bg);border-bottom:1px solid var(--border);z-index:5;}
#bar a{color:var(--blue);text-decoration:none;font-size:14px;}
#fname{font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,monospace;}
h1,h2,h3,h4{font-weight:600;margin:1em 0 .4em;line-height:1.3;}
h1{font-size:1.6em;} h2{font-size:1.3em;border-bottom:1px solid var(--border);padding-bottom:.2em;} h3{font-size:1.1em;}
p,li{margin:.5em 0;} ul,ol{padding-left:1.5em;}
a{color:var(--blue);} strong{font-weight:600;}
blockquote{border-left:3px solid var(--border);margin:.6em 0;padding:.3em 1em;color:var(--text2);}
hr{border:none;border-top:1px solid var(--border);margin:1.2em 0;}
table{border-collapse:collapse;width:100%;margin:.8em 0;font-size:.92em;display:block;overflow-x:auto;}
th,td{border:1px solid var(--border);padding:7px 11px;text-align:left;} th{background:var(--bg2);}
code:not(pre code){background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:1px 5px;font-family:ui-monospace,monospace;font-size:.85em;color:var(--code);}
pre{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 16px;overflow-x:auto;margin:.7em 0;}
pre code{font-family:ui-monospace,monospace;font-size:13px;line-height:1.6;color:#c9d1d9;}
img{max-width:100%;border-radius:8px;}
#err{color:#ff6b6b;padding:20px;font-family:ui-monospace,monospace;font-size:13px;}
</style>
</head>
<body>
<div id="bar"><a href="#" onclick="history.back();return false">‹ 返回</a><span id="fname"></span></div>
<div id="content"><p style="color:var(--text2)">載入中…</p></div>
<script>
try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch {}
document.querySelector('meta[name=theme-color]').content = document.documentElement.dataset.theme === 'light' ? '#ffffff' : '#0d0d0d';

const params = new URLSearchParams(location.search);
const path = params.get('path'), base = params.get('base');
document.getElementById('fname').textContent = (path || '').replace(/\\/g,'/').split('/').pop();

const renderer = new marked.Renderer();
renderer.code = (code, lang) => {
  const hl = lang && hljs.getLanguage(lang) ? hljs.highlight(code, {language:lang}).value
    : String(code).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<pre><code class="hljs">${hl}</code></pre>`;
};
marked.use({ renderer, breaks:true, gfm:true });

// Rewrite relative links/images inside the doc to stream through /media too.
function rewrite(container) {
  for (const el of container.querySelectorAll('a[href],img[src]')) {
    const attr = el.tagName === 'IMG' ? 'src' : 'href';
    const v = el.getAttribute(attr) || '';
    if (/^(https?:|mailto:|tel:|#|data:)/i.test(v)) continue;
    const url = '/media?path=' + encodeURIComponent(v) + (base ? '&base=' + encodeURIComponent(base) : '');
    if (el.tagName === 'A' && /\.(md|txt|log|markdown)$/i.test(v)) {
      el.setAttribute('href', '/viewer.html?path=' + encodeURIComponent(v) + (base ? '&base=' + encodeURIComponent(base) : ''));
    } else {
      el.setAttribute(attr, url);
    }
  }
}

(async () => {
  if (!path) { document.getElementById('content').innerHTML = '<div id="err">no path</div>'; return; }
  try {
    const url = '/media?path=' + encodeURIComponent(path) + (base ? '&base=' + encodeURIComponent(base) : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const c = document.getElementById('content');
    c.innerHTML = DOMPurify.sanitize(marked.parse(text));
    rewrite(c);
  } catch (e) {
    document.getElementById('content').innerHTML = '<div id="err">載入失敗：' + e.message + '</div>';
  }
})();
</script>
</body>
</html>
